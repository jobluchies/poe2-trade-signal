name: fetch-and-report

# Hourly snapshot of poe.ninja. The accumulating SQLite DB + generated report live
# on the `data` branch, NOT on main — main stays code-only so human code pushes
# never collide with the bot's hourly snapshot commits. The dashboard is published
# to GitHub Pages from the artifact this job uploads (not from a branch).
#
# poe.ninja is behind Cloudflare, so the fetcher drives headless Chromium
# (Playwright). Cloudflare MAY challenge GitHub's datacenter IPs even though it
# passes from a home IP — use the manual "Run workflow" button (workflow_dispatch)
# to test before trusting the schedule.

on:
  schedule:
    - cron: "0 * * * *"      # top of every hour (UTC); GitHub cron is best-effort
  workflow_dispatch: {}        # manual trigger for testing

permissions:
  contents: write              # commit the updated DB + report to the data branch
  pages: write                 # publish the dashboard
  id-token: write              # required by deploy-pages

# Never let two scheduled runs publish on top of each other.
concurrency:
  group: fetch-and-report
  cancel-in-progress: false

env:
  DATA_BRANCH: data

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0          # full history so worktree/rebase have a merge base

      - name: Restore accumulated DB from the data branch
        # The time-series DB accumulates across runs and lives on `data`. Pull just
        # the DB into this code checkout so `cli.py fetch` appends onto real history
        # instead of a blank DB. (output/ is fully regenerated, so it needn't restore.)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin "$DATA_BRANCH" || true
          if git rev-parse --verify "origin/$DATA_BRANCH" >/dev/null 2>&1; then
            git checkout "origin/$DATA_BRANCH" -- data/poe2_signal.db || true
          fi

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies + Chromium
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Fetch snapshot (currency + uniques)
        run: python cli.py fetch

      - name: Regenerate report + dashboard
        run: |
          python cli.py report
          cp output/dashboard.html output/index.html   # Pages root -> dashboard

      - name: Publish DB + report to the data branch
        # Commit the artifacts to `data` via a dedicated worktree pinned to the live
        # data-branch tip — main is never touched. On a rejected push (the data
        # branch advanced, e.g. a queued run) re-sync to the new tip and re-run fetch
        # so rows append onto the live DB instead of clobbering another snapshot;
        # the binary DB can't auto-merge, so we rebuild rather than rebase.
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          publish() {
            # (Re)create a worktree at the latest data-branch tip, copy the freshly
            # built artifacts in, and commit there. Returns 1 if nothing changed.
            rm -rf ../data-branch
            git worktree prune
            git fetch origin "$DATA_BRANCH" || true
            if git rev-parse --verify "origin/$DATA_BRANCH" >/dev/null 2>&1; then
              git worktree add -B "$DATA_BRANCH" ../data-branch "origin/$DATA_BRANCH"
            else
              git worktree add --orphan -B "$DATA_BRANCH" ../data-branch
            fi
            mkdir -p ../data-branch/data ../data-branch/output
            cp data/poe2_signal.db ../data-branch/data/
            rm -rf ../data-branch/output/*
            cp -r output/. ../data-branch/output/
            git -C ../data-branch add data/ output/
            if git -C ../data-branch diff --cached --quiet; then
              echo "No data changes to publish."
              return 1
            fi
            git -C ../data-branch commit -m "data: snapshot $(date -u +%Y-%m-%dT%H:%MZ)"
            return 0
          }

          attempts=3
          for i in $(seq 1 "$attempts"); do
            if ! publish; then
              exit 0                # nothing new to push
            fi
            if git -C ../data-branch push origin "$DATA_BRANCH"; then
              echo "Published to $DATA_BRANCH on attempt $i."
              exit 0
            fi
            echo "Push rejected on attempt $i; data branch advanced. Re-syncing + re-fetching."
            git checkout "origin/$DATA_BRANCH" -- data/poe2_signal.db || true
            python cli.py fetch
            python cli.py report
            cp output/dashboard.html output/index.html
            sleep $(( i * 3 ))
          done

          echo "::error::Failed to publish to $DATA_BRANCH after $attempts attempts."
          exit 1

      - name: Upload dashboard as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: fetch
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
